[build]
  command = "hugo --minify --gc"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.160.1"
  HUGO_ENV = "production"
  GO_VERSION = "1.24.2"

# HTML pages intentionally have no header rule: Netlify's default is
# "public, max-age=0, must-revalidate" with an ETag, so browsers revalidate
# every visit (fresh after deploys) but still get cheap 304s.
# Note: Netlify stacks headers from every matching rule, so a blanket /*
# no-cache rule would also poison the asset rules below.

# Fingerprinted by Hugo Pipes — filename changes when content changes.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Not fingerprinted (stable filenames), so cache for a week and revalidate.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
