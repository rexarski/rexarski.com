<style>
    /* Fonts: loaded via <link> in baseof.html (avoids @import blocking) */

    /* ─── Design Tokens — Light Mode ─────────────────────────── */
    :root {
        --content-width: 760px;
        --left-gutter: clamp(20px, 6vw, 92px);
        --page-head-width: min(100%, 700px);
        --page-head-ascii-size: 0.95rem;
        --fs--1: 0.8rem;
        --fs--2: 0.72rem;
        --fs--3: 0.65rem;
        --fs-0: 0.9rem;
        --fs-1: 1rem;
        --fs-2: 1.25rem;
        --fs-3: 1.56rem;
        --fs-4: 1.95rem;
        --fs-5: 2.44rem;
        --lh-tight: 1.2;
        --lh-title: 1.25;
        --lh-body: 1.68;
        --lh-meta: 1.45;
        --font-body: "Atkinson Hyperlegible Next", sans-serif;
        --font-serif: "Fraunces", serif;
        --font-mono: "JetBrains Mono", monospace;

        --bg: #f8f5f1;
        --surface: #f0ece6;
        --text: #3a3228;
        --heading: #1c1815;
        --link: #3a3228;
        --link-hover-fg: #f8f5f1;
        --link-hover-bg: #1c1815;
        --accent: #0062a8;
        --muted: #7a6f65;
        --muted-strong: #9e938a;
        --border: #e5dfd7;
        --table-border: #d8d0c8;
        --code-bg: #ece7e0;
        --code-color: #2a2218;
        --pre-code-color: #2a2218;
        --blockquote-border: #0062a8;
        --mark-bg: #f7e68a;
        --mark-text: #2a2010;
        --toc-frame: #7a6f65;
        --toc-content-color: #7a6f65;
        --toc-hover-bg: #f7e68a;
        --toc-hover-text: #1c1815;
        --nav-border: #e5dfd7;
        --nav-label-color: #7a6f65;
        --nav-title-color: #3a3228;
        --nav-title-hover: #1c1815;
        --helptext: #9e938a;
        --form-bg: #f8f5f1;
        --form-text: #1c1815;

        /* Blog heatmap scale (light) */
        --heatmap-1: #99c9e8;
        --heatmap-2: #5ba3d4;
        --heatmap-3: #2d7eb8;
        --heatmap-4: var(--accent);
    }

    /* ─── Reset ───────────────────────────────────────────────── */
    * {
        font-synthesis: none !important;
    }

    /* ─── Grain overlay ───────────────────────────────────────── */
    html::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        background-size: 128px 128px;
    }

    /* ─── Base ────────────────────────────────────────────────── */
    html {
        scroll-behavior: smooth;
    }

    body {
        font-family: var(--font-body);
        margin: 0;
        padding: 28px 0 32px;
        max-width: none;
        font-size: var(--fs-1);
        text-align: left;
        background-color: var(--bg);
        word-wrap: break-word;
        overflow-wrap: break-word;
        line-height: var(--lh-body);
        color: var(--text);
        overflow-y: scroll;
    }

    header,
    main,
    footer {
        width: min(100% - (var(--left-gutter) + 20px), var(--content-width));
        margin-left: var(--left-gutter);
    }

    header,
    main {
        margin-right: auto;
    }

    main {
        margin-top: 2rem;
    }

    /* ─── Typography ─────────────────────────────────────────── */
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
        color: var(--heading);
        font-family: var(--font-serif);
        text-wrap: pretty;
    }

    h1 {
        font-size: var(--fs-5);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: var(--lh-tight);
    }

    h2 {
        font-size: var(--fs-4);
        font-weight: 600;
        letter-spacing: -0.025em;
        line-height: var(--lh-tight);
    }

    h3 {
        font-size: var(--fs-3);
        font-weight: 600;
        letter-spacing: -0.01em;
        line-height: var(--lh-title);
    }

    h4,
    h5,
    h6 {
        font-size: var(--fs-2);
        font-weight: 600;
        line-height: var(--lh-title);
    }

    strong,
    b {
        color: var(--heading);
        font-weight: 700;
    }

    /* ─── Links ──────────────────────────────────────────────── */
    a {
        color: var(--link);
        text-decoration: underline;
        text-decoration-thickness: 2px;
        text-underline-offset: 0.18em;
        border-radius: 2px;
        box-decoration-break: clone;
        -webkit-box-decoration-break: clone;
        transition:
            color 0.14s ease,
            background-color 0.14s ease;
    }

    a:hover,
    a:focus-visible {
        color: var(--link-hover-fg);
        background-color: var(--link-hover-bg);
    }

    a:visited {
        color: var(--link);
    }

    /* Top accent bar */
    body::before {
        content: "";
        display: block;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--accent);
        z-index: 100;
    }

    /* Remove the top accent bar in dark mode (it reads like a stray cyan line). */
    body.theme-dark::before,
    body.force-dark::before {
        display: none;
    }

    /* ─── Header / Wordmark ──────────────────────────────────── */
    .title {
        border: 0;
        font-family: var(--font-serif);
    }

    .title span {
        font-weight: 400;
    }

    .site-wordmark {
        display: inline-block;
    }

    .site-wordmark .wordmark {
        height: 1.4em;
        width: auto;
        vertical-align: middle;
    }

    .site-wordmark .wordmark-dot {
        fill: var(--accent);
    }

    .site-description {
        font-size: var(--fs-0);
        font-weight: 400;
        color: var(--muted);
        margin: 0.3rem 0 0 0;
        line-height: var(--lh-meta);
        max-width: 44ch;
    }

    /* ─── Navigation ─────────────────────────────────────────── */
    nav {
        margin-top: 0.75rem;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.35rem 1rem;
        width: fit-content;
        padding: 0.2rem 0;
    }

    nav a {
        margin-right: 0;
        color: var(--muted);
        font-size: var(--fs-0);
        transition: color 0.18s ease;
    }

    nav a:hover {
        color: var(--heading);
    }

    nav a.active {
        color: var(--accent);
        font-weight: 600;
    }

    .rss-link {
        text-decoration-color: #b8860b;
    }

    .rss-link:hover {
        text-decoration-color: #8b6914;
    }

    /* ─── Forms ──────────────────────────────────────────────── */
    textarea,
    input {
        font-size: 16px;
        background-color: var(--form-bg);
        color: var(--form-text);
    }

    textarea {
        width: 100%;
    }

    /* ─── Content elements ───────────────────────────────────── */
    content {
        line-height: var(--lh-body);
    }

    content p {
        margin-bottom: 1.5rem;
    }

    content p:last-child {
        margin-bottom: 0;
    }

    content h2 {
        margin-top: 2.5rem;
        margin-bottom: 0.75rem;
    }

    content h2:first-child {
        margin-top: 0;
    }

    content h3,
    content h4 {
        margin-top: 2rem;
        margin-bottom: 0.5rem;
    }

    content ul,
    content ol {
        margin-bottom: 1.5rem;
    }

    content li {
        margin-bottom: 0.4rem;
        padding-left: 0.15em;
    }

    content li:last-child {
        margin-bottom: 0;
    }

    /* External link indicator on single posts */
    .single-post content a[href^="http"] {
        color: var(--accent);
    }

    .single-post content a[href^="http"]:hover {
        text-decoration-thickness: 2px;
    }

    /* Changelog page: latest block stays open; older entries fold by year (see changelog.html) */
    .changelog-body details.changelog-year {
        margin: 1rem 0 0;
    }

    .changelog-body details.changelog-year summary {
        cursor: pointer;
        font-weight: 600;
        color: var(--heading);
        list-style: none;
    }

    .changelog-body details.changelog-year summary::-webkit-details-marker {
        display: none;
    }

    .changelog-body details.changelog-year summary::before {
        content: "▶ ";
        display: inline-block;
        margin-right: 0.25em;
    }

    .changelog-body details.changelog-year[open] summary::before {
        content: "▼ ";
    }

    .changelog-body .changelog-year-list {
        margin: 0.5rem 0 0;
        padding-left: 1.25rem;
    }

    /* ─── Images ─────────────────────────────────────────────── */
    img {
        max-width: 100%;
        border-radius: 4px;
    }

    /* ─── Blockquote ─────────────────────────────────────────── */
    blockquote {
        border-left: 4px solid var(--blockquote-border);
        color: var(--heading);
        padding: 0.5rem 0 0.5rem 1.5rem;
        margin: 2rem 0;
        font-family: var(--font-serif);
        font-style: italic;
        font-size: var(--fs-1);
        line-height: 1.65;
        background: transparent;
    }

    blockquote p:last-child {
        margin-bottom: 0;
    }

    /* ─── Code ───────────────────────────────────────────────── */
    code {
        padding: 2px 6px;
        font-family: var(--font-mono);
        font-size: var(--fs-0);
        background-color: var(--code-bg);
        color: var(--code-color);
        border-radius: 3px;
    }

    pre code {
        display: block;
        padding: 1.25rem;
        white-space: pre-wrap;
        font-size: var(--fs-0);
        font-family: var(--font-mono);
        color: var(--pre-code-color);
        background-color: var(--code-bg);
        border-radius: 6px;
        line-height: 1.6;
    }

    div.highlight pre {
        background-color: initial;
        color: initial;
        border-radius: 6px;
        overflow: hidden;
    }

    div.highlight code {
        background-color: unset;
        color: unset;
    }

    body.force-dark
        div.highlight
        pre[style*="background-color:#272822"]
        span[style*="color:#75715e"],
    body.force-dark
        div.highlight
        pre[style*="background-color:#272822"]
        span[style*="color: #75715e"] {
        color: #9ca3af !important;
    }

    @media (prefers-color-scheme: dark) {
        div.highlight
            pre[style*="background-color:#272822"]
            span[style*="color:#75715e"],
        div.highlight
            pre[style*="background-color:#272822"]
            span[style*="color: #75715e"] {
            color: #9ca3af !important;
        }
    }

    /* ─── Tables ─────────────────────────────────────────────── */
    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 1.5rem;
        font-size: var(--fs-1);
    }

    table,
    th,
    td {
        border: 1px solid var(--table-border);
    }

    th,
    td {
        text-align: left;
        padding: 0.5rem 0.75rem;
    }

    th {
        background-color: var(--surface);
        font-weight: 600;
        font-family: var(--font-serif);
    }

    /* ─── Mark / Kbd ─────────────────────────────────────────── */
    mark {
        background-color: var(--mark-bg);
        color: var(--mark-text);
        padding: 0 2px;
        border-radius: 2px;
    }

    kbd {
        border: 1.5px solid var(--border);
        box-shadow: 1px 1px 0 var(--muted-strong);
        display: inline-block;
        padding: 1px 5px;
        border-radius: 0.25em;
        min-width: 1.5em;
        text-align: center;
        margin-right: 0.15em;
        font-family: var(--font-mono);
        font-size: var(--fs-0);
        background: var(--surface);
    }

    kbd:hover {
        position: relative;
        top: 1px;
        left: 1px;
    }

    /* ─── Posts list heading + graph buttons ─────────────────── */
    .posts-list-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 0.5rem;
    }

    .graph-view-link {
        font-size: var(--fs-0);
        font-weight: 500;
        color: var(--accent);
    }

    button.graph-view-btn {
        background: none;
        border: none;
        cursor: pointer;
        font: inherit;
        padding: 0;
        color: var(--accent);
    }

    button.graph-view-btn:hover {
        text-decoration: underline;
        text-decoration-thickness: 2px;
    }

    .graph-easter-egg {
        text-align: center;
        margin: 0.5rem 0 0;
    }

    .graph-view-btn-easter {
        background: none;
        border: none;
        cursor: pointer;
        font-size: var(--fs--2);
        color: var(--muted);
        padding: 0;
        text-decoration: none;
    }

    .graph-view-btn-easter:hover {
        color: var(--muted-strong);
    }

    /* ─── Graph overlay ──────────────────────────────────────── */
    .graph-overlay {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: stretch;
        justify-content: stretch;
        box-sizing: border-box;
        opacity: 0;
        visibility: hidden;
        transition:
            opacity 0.2s ease,
            visibility 0.2s ease;
        background: var(--surface);
    }

    .graph-overlay.graph-overlay-open {
        opacity: 1;
        visibility: visible;
    }

    .graph-overlay-close {
        position: absolute;
        top: 0.75rem;
        right: 0.75rem;
        z-index: 10;
        width: 2.25rem;
        height: 2.25rem;
        padding: 0;
        border: none;
        border-radius: 50%;
        background: var(--border);
        color: var(--text);
        font-size: var(--fs-3);
        line-height: 1;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.85;
    }

    .graph-overlay-close:hover {
        opacity: 1;
        background: var(--muted-strong);
    }

    .graph-canvas-container {
        flex: 1;
        width: 100%;
        height: 100%;
        min-height: 0;
    }

    .graph-overlay-msg {
        margin: 0;
        padding: 2rem;
        color: var(--muted);
        text-align: center;
    }

    /* ─── Blog post list ─────────────────────────────────────── */
    ul.blog-posts {
        list-style-type: none;
        padding: 0;
        margin: 0;
    }

    ul.blog-posts li {
        display: flex;
        align-items: baseline;
        gap: 1rem;
        margin-bottom: 0.6rem;
        opacity: 0;
        animation: post-entry 0.4s ease forwards;
    }

    ul.blog-posts li:nth-child(1) {
        animation-delay: 0.05s;
    }
    ul.blog-posts li:nth-child(2) {
        animation-delay: 0.1s;
    }
    ul.blog-posts li:nth-child(3) {
        animation-delay: 0.15s;
    }
    ul.blog-posts li:nth-child(4) {
        animation-delay: 0.2s;
    }
    ul.blog-posts li:nth-child(5) {
        animation-delay: 0.25s;
    }
    ul.blog-posts li:nth-child(6) {
        animation-delay: 0.3s;
    }
    ul.blog-posts li:nth-child(7) {
        animation-delay: 0.35s;
    }
    ul.blog-posts li:nth-child(8) {
        animation-delay: 0.4s;
    }
    ul.blog-posts li:nth-child(9) {
        animation-delay: 0.45s;
    }
    ul.blog-posts li:nth-child(10) {
        animation-delay: 0.5s;
    }

    @keyframes post-entry {
        from {
            opacity: 0;
            transform: translateY(6px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    ul.blog-posts li:last-child {
        margin-bottom: 0;
    }

    ul.blog-posts li span {
        flex: 0 0 auto;
        font-family: var(--font-mono);
        font-size: var(--fs--1);
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
    }

    /* Toolbox list */
    ul.toolbox-list li.toolbox-section {
        display: block;
    }

    ul.toolbox-list ul.toolbox-sublist {
        padding-left: 1.5em;
        margin-top: 0.25em;
        margin-bottom: 0.5em;
    }

    ul.toolbox-list ul.toolbox-sublist li {
        display: flex;
    }

    .post-date {
        font-family: var(--font-mono);
        font-size: var(--fs-0);
        font-weight: 400;
        color: var(--muted);
        margin-right: 2rem;
    }

    /* ─── Moments page (LMNT.me/moments-style) ───────────────── */
    .moments-page {
        max-width: 42rem;
    }

    .moments-title {
        color: var(--heading);
        font-family: var(--font-serif);
        font-size: var(--fs-5);
        font-weight: 700;
        letter-spacing: -0.03em;
        line-height: var(--lh-tight);
        text-wrap: pretty;
        margin-bottom: 0.75rem;
    }

    .moments-intro {
        margin-bottom: 1.5rem;
        line-height: 1.6;
        color: var(--text);
    }

    .moments-intro p {
        margin-bottom: 0.5rem;
    }

    .moments-year {
        font-size: var(--fs-1);
        font-weight: 600;
        color: var(--heading);
        margin: 2rem 0 0.5rem;
    }

    .moments-year:first-of-type {
        margin-top: 0;
    }

    .moments-month {
        font-size: var(--fs-2);
        font-weight: 600;
        color: var(--heading);
        margin: 1.25rem 0 0.5rem;
    }

    .moments-entries {
        list-style-type: disc;
        padding-left: 1.5rem;
        margin: 0 0 0.5rem;
    }

    .moments-entry {
        margin-bottom: 0.25rem;
        line-height: 1.5;
    }

    .moments-icon {
        margin-right: 0.35em;
    }

    .moments-day {
        display: inline-block;
        min-width: 2.5ch;
        font-variant-numeric: tabular-nums;
    }

    .moments-title-inline {
        font-style: italic;
    }

    .moments-title-inline em {
        font-style: italic;
    }

    .moments-note {
        color: var(--muted);
        font-size: var(--fs-0);
    }

    .moments-empty {
        color: var(--muted);
        font-size: var(--fs-0);
    }

    /* ─── Moments stats counter ───────────────── */
    .moments-stats {
        margin-top: 2.5rem;
        padding-top: 1.25rem;
        border-top: 1px dashed var(--border);
    }

    .moments-stats-total {
        font-family: var(--font-mono);
        font-size: var(--fs--1);
        color: var(--muted);
        letter-spacing: 0.04em;
        margin-bottom: 0.65rem;
    }

    .moments-bar-chart {
        font-family: var(--font-mono);
        font-size: var(--fs--1);
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
        margin-top: 0.75rem;
    }

    .moments-bar-row {
        display: grid;
        grid-template-columns: 1.75rem auto 2rem;
        align-items: center;
        gap: 0 0.5rem;
    }

    .moments-bar-label {
        font-size: 0.85em;
        text-align: center;
        line-height: 1;
    }

    .moments-bar-filled {
        color: var(--muted-strong);
        letter-spacing: 0.05em;
    }

    .moments-bar-empty {
        color: var(--border);
        letter-spacing: 0.05em;
    }

    .moments-bar-count {
        font-size: var(--fs--2);
        color: var(--muted);
        text-align: right;
        font-variant-numeric: tabular-nums;
    }

    /* ─── Dithering photo ─────────────────────── */
    .dithering-photo {
        perspective: 1200px;
        margin: 2rem auto;
        max-width: 70%;
        display: flex;
        justify-content: center;
    }

    .dithering-photo-inner {
        transform-style: preserve-3d;
        transition: transform 0.12s ease-out;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .dithering-photo-inner canvas,
    .dithering-photo-inner img {
        display: block;
        max-width: 100%;
        height: auto;
        vertical-align: middle;
    }

    .dithering-photo-face {
        position: relative;
    }

    .dithering-photo-caption {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        margin: 0;
        padding: 0.6rem 0.75rem;
        font-size: var(--fs-0);
        color: rgba(255, 255, 255, 0.95);
        text-align: center;
        background: linear-gradient(
            to top,
            rgba(0, 0, 0, 0.55) 0%,
            transparent 100%
        );
        z-index: 2;
    }

    /* ─── Blog heatmap ───────────────────────────────────────── */
    .blog-heatmap {
        position: relative;
        margin: 2rem 0;
        padding: 1rem 0;
    }

    .blog-heatmap-header {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
        margin-bottom: 0.75rem;
        font-size: var(--fs-0);
        color: var(--muted);
    }

    .blog-heatmap-title {
        font-weight: 600;
        color: var(--heading);
    }

    .blog-heatmap-streak {
        position: absolute;
        top: 1rem;
        right: 0;
        font-family: var(--font-mono);
        font-size: var(--fs-0);
        color: var(--accent);
        font-weight: 600;
    }

    .blog-heatmap-legend {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
    }

    .blog-heatmap-legend-cell {
        width: 10px;
        height: 10px;
        border-radius: 2px;
    }

    .blog-heatmap-legend-cell.count-0 {
        background: var(--border);
    }
    .blog-heatmap-legend-cell.count-1 {
        background: var(--heatmap-1);
    }
    .blog-heatmap-legend-cell.count-2 {
        background: var(--heatmap-2);
    }
    .blog-heatmap-legend-cell.count-3 {
        background: var(--heatmap-3);
    }
    .blog-heatmap-legend-cell.count-4 {
        background: var(--heatmap-4);
    }

    .blog-heatmap-grid {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .blog-heatmap-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .blog-heatmap-year {
        font-family: var(--font-mono);
        font-size: var(--fs--1);
        color: var(--muted);
        flex: 0 0 2.5rem;
    }

    .blog-heatmap-stripes {
        display: flex;
        flex-direction: row;
        gap: 2px;
        flex: 1;
        min-width: 0;
    }

    .blog-heatmap-cell {
        flex: 1;
        min-width: 4px;
        max-width: 12px;
        height: 14px;
        border-radius: 2px;
        background: var(--border);
        transition: opacity 0.15s ease;
    }

    .blog-heatmap-cell.count-0 {
        background: var(--border);
    }
    .blog-heatmap-cell.count-1 {
        background: var(--heatmap-1);
    }
    .blog-heatmap-cell.count-2 {
        background: var(--heatmap-2);
    }
    .blog-heatmap-cell.count-3 {
        background: var(--heatmap-3);
    }
    .blog-heatmap-cell.count-4 {
        background: var(--heatmap-4);
    }

    .blog-heatmap-cell:hover {
        opacity: 0.85;
    }

    .blog-heatmap-week-labels {
        display: flex;
        justify-content: space-between;
        margin-top: 0.35rem;
        padding-left: 3.25rem;
        font-size: var(--fs--2);
        color: var(--muted);
    }

    /* ─── Now progress bars ──────────────────────────────────── */
    .now-progress-bars {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        margin: 1.25rem 0;
        padding: 1rem 0;
    }

    .now-progress-item {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 0 1rem;
    }

    .now-progress-label {
        font-size: var(--fs-0);
        font-weight: 600;
        color: var(--text);
        min-width: 6rem;
    }

    .now-progress-track {
        min-width: 0;
        height: 0.75rem;
        background: var(--border);
        border-radius: 999px;
        overflow: hidden;
    }

    .now-progress-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 999px;
        transition: width 0.25s ease;
    }

    .now-progress-meta {
        font-size: var(--fs-0);
        color: var(--muted);
        min-width: 22ch;
        text-align: right;
    }

    /* ─── Now marquee ────────────────────────────────────────── */
    .now-marquee {
        overflow: hidden;
        margin: 1.25rem 0;
        padding: 0.75rem 0;
    }

    .now-marquee-track {
        display: flex;
        width: max-content;
        animation: now-marquee-scroll 25s linear infinite;
    }

    .now-marquee-track:hover {
        animation-play-state: paused;
    }

    .now-marquee-inner {
        display: flex;
        align-items: center;
        gap: 2rem;
        padding: 0 2rem;
        flex-shrink: 0;
    }

    .now-marquee-inner ul {
        display: flex;
        list-style: none;
        padding: 0;
        margin: 0;
        gap: 2rem;
        flex-wrap: nowrap;
    }

    .now-marquee-inner li {
        white-space: nowrap;
        margin: 0;
    }

    @keyframes now-marquee-scroll {
        0% {
            transform: translateX(0);
        }
        100% {
            transform: translateX(-50%);
        }
    }

    /* ─── Now history (collapsed past items) ─────────────────── */
    .now-history {
        margin: 1.75rem 0 0;
        padding: 1rem 0 0;
    }

    .now-history-summary {
        cursor: pointer;
        font-size: var(--fs-1);
        font-weight: 600;
        color: var(--heading);
        font-family: var(--font-serif);
        list-style: none;
    }

    .now-history-summary::-webkit-details-marker {
        display: none;
    }

    .now-history-summary::before {
        content: "▸ ";
        display: inline-block;
        color: var(--accent);
        transition: transform 0.15s ease;
    }

    details.now-history[open] > .now-history-summary::before {
        transform: rotate(90deg);
    }

    .now-history-list {
        margin: 0.85rem 0 0;
        padding: 0;
        list-style: none;
    }

    .now-history-item {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 0.35rem 1rem;
        align-items: baseline;
        padding: 0.45rem 0;
        border-bottom: 1px solid var(--border);
        font-size: var(--fs-0);
        line-height: var(--lh-meta);
    }

    .now-history-item:last-child {
        border-bottom: none;
    }

    .now-history-dates {
        font-family: var(--font-mono);
        font-size: var(--fs--1);
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
    }

    .now-history-sep {
        margin: 0 0.25rem;
        color: var(--border);
    }

    .now-history-text {
        color: var(--text);
        min-width: 0;
    }

    .now-history-text p {
        margin: 0;
    }

    .now-history-text p + p {
        margin-top: 0.35rem;
    }

    /* ─── NeoDB shelf (build-time from profile HTML fragments) ─ */
    .now-neodb {
        margin: 1.25rem 0 1.75rem;
    }

    .now-neodb-block + .now-neodb-block {
        margin-top: 1.1rem;
    }

    .now-neodb-heading {
        margin: 0 0 0.4rem;
        font-size: var(--fs-0);
        font-weight: 600;
        font-family: var(--font-serif);
        color: var(--heading);
    }

    .now-neodb-list {
        margin: 0;
        padding-left: 1.15rem;
        font-size: var(--fs-0);
        line-height: var(--lh-body);
    }

    .now-neodb-list li {
        margin: 0.2rem 0;
        padding-left: 0.1em;
    }

    .now-neodb-empty {
        margin: 0;
        font-size: var(--fs-0);
        color: var(--muted);
    }

    @media screen and (max-width: 520px) {
        .now-history-item {
            grid-template-columns: 1fr;
        }

        .now-history-dates {
            white-space: normal;
        }
    }

    /* ─── Cards ──────────────────────────────────────────────── */
    .profile-border {
        border: 2px double var(--border);
        box-shadow: 2px 2px 0 var(--muted-strong);
        padding: 15px;
        border-radius: 0.35em;
        margin: 15px 0;
    }

    .about-card {
        margin: 1.25rem 0;
        padding: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
    }

    .about-card-title {
        margin: 0 0 0.75rem 0;
        font-family: var(--font-serif);
        font-size: var(--fs-2);
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--heading);
    }

    .now-kanban {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 1rem;
        margin: 1.25rem 0;
        align-items: start;
    }

    .now-card {
        border: 1.5px solid var(--border);
        box-shadow: 2px 3px 0 rgba(60, 40, 20, 0.08);
        border-radius: 0.5em;
        padding: 1rem 1.25rem;
        min-height: 0;
        background: var(--surface);
        transition:
            transform 0.18s ease,
            box-shadow 0.18s ease;
    }

    .now-card:hover {
        transform: translateY(-2px);
        box-shadow: 3px 5px 0 rgba(60, 40, 20, 0.12);
    }

    .now-card p:last-child,
    .now-card ul:last-child {
        margin-bottom: 0;
    }

    /* ─── Avatar ─────────────────────────────────────────────── */
    .avatar {
        vertical-align: center;
        width: 50px;
        height: 50px;
        border-radius: 50%;
    }

    /* ─── Minimalist list ────────────────────────────────────── */
    .minimalist-list {
        margin: 5px 0;
        border-radius: 8px;
    }

    .minimalist-item {
        margin-bottom: 8px;
        line-height: 1.5;
    }

    .minimalist-item:last-child {
        margin-bottom: 0;
    }

    .minimalist-item a {
        color: var(--link);
    }

    .minimalist-item a:hover {
        color: var(--accent);
    }

    /* ─── TOC ────────────────────────────────────────────────── */
    .toc-wrapper {
        width: 61.8%;
        max-width: 445px;
        margin: 1rem 0;
        position: relative;
    }

    .toc-container {
        padding: 1rem;
        font-size: var(--fs-0);
        color: var(--toc-content-color);
    }

    .toc-wrapper::before,
    .toc-wrapper::after,
    .toc-wrapper .left-border,
    .toc-wrapper .right-border,
    .toc-wrapper .bottom-left,
    .toc-wrapper .bottom-right {
        color: var(--toc-frame);
        opacity: 0.7;
        font-family: monospace;
    }

    .toc-wrapper::before {
        content: "┌─";
        position: absolute;
        left: 0;
        top: 0;
    }

    .toc-wrapper::after {
        content: "─┐";
        position: absolute;
        right: 0;
        top: 0;
    }

    .toc-wrapper .left-border,
    .toc-wrapper .right-border {
        position: absolute;
        top: 1.2em;
        bottom: 1.2em;
    }

    .toc-wrapper .left-border {
        left: 0;
    }

    .toc-wrapper .right-border {
        right: 0;
    }

    .toc-wrapper .bottom-left,
    .toc-wrapper .bottom-right {
        position: absolute;
        bottom: 0;
    }

    .toc-wrapper .bottom-left {
        left: 0;
    }

    .toc-wrapper .bottom-right {
        right: 0;
    }

    .toc-header {
        font-weight: bold;
        margin-bottom: 0.5rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid var(--toc-frame);
        opacity: 0.7;
        font-family: var(--font-serif);
    }

    .toc-content {
        font-size: var(--fs-0);
        font-family: var(--font-serif);
    }

    .toc-content ul {
        list-style: none;
        padding-left: 1rem;
        margin: 0;
    }

    .toc-content li {
        margin: 0.3rem 0;
    }

    .toc-content a {
        color: var(--toc-content-color);
        opacity: 0.8;
        transition: all 0.2s ease;
    }

    .toc-content a:hover {
        opacity: 1;
        color: var(--toc-hover-text);
        background-color: var(--toc-hover-bg);
        padding: 0.1rem 0.3rem;
        border-radius: 0.2rem;
    }

    /* ─── Badges ─────────────────────────────────────────────── */
    li img.badge,
    aside img.badge {
        image-rendering: pixelated;
        width: 44px !important;
        height: 15.5px !important;
        vertical-align: middle;
    }

    img.badge {
        image-rendering: pixelated;
        width: 88px !important;
        height: 31px !important;
        margin: 0;
        border-radius: 0;
        box-shadow: none;
    }

    img.badge:hover {
        opacity: 0.75;
    }

    div.badgebox a {
        width: 88px !important;
        height: 31px !important;
    }

    div.badgebox {
        margin: 0.5em 0;
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-start;
        gap: 4px;
        max-width: 364px;
    }

    /* ─── ObservableHQ ───────────────────────────────────────── */
    .observablehq:not(:first-of-type) {
        display: none;
    }

    /* ─── Helptext ───────────────────────────────────────────── */
    .helptext {
        color: var(--helptext);
        font-size: var(--fs--1);
    }

    .errorlist {
        color: #eba613;
        font-size: var(--fs--1);
    }

    /* ─── Post navigation ────────────────────────────────────── */
    .post-navigation {
        margin: 2rem 0;
        padding: 1rem 0;
        border-top: 1px solid var(--nav-border);
        border-bottom: 1px solid var(--nav-border);
    }

    .post-navigation .nav-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .post-navigation .nav-item {
        text-align: left;
    }

    .post-navigation .nav-item.next {
        text-align: right;
    }

    .post-navigation .nav-label {
        font-size: var(--fs-0);
        color: var(--nav-label-color);
    }

    .post-navigation .nav-title {
        color: var(--nav-title-color);
        font-weight: 500;
    }

    .post-navigation .nav-title:hover {
        color: var(--nav-title-hover);
    }

    /* ─── Homepage post list ─────────────────────────────────── */
    .post-list {
        margin: 1rem 0;
    }

    /* Year sections on /posts (same list style as home; year is the heading only) */
    .post-list-year-heading {
        font-family: var(--font-serif);
        font-size: var(--fs-3);
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--heading);
        margin: 1.5rem 0 0.35rem;
    }

    .post-list-year-heading:first-of-type {
        margin-top: 0.75rem;
    }

    .post-list-empty {
        color: var(--muted);
        margin: 0.5rem 0;
    }

    .post-list-featured {
        margin-bottom: 1rem;
    }

    .post-list-featured-meta {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.25rem;
    }

    .post-list-featured-date {
        font-family: var(--font-mono);
        font-size: var(--fs-0);
        color: var(--muted);
        font-variant-numeric: tabular-nums;
    }

    .post-list-featured-link {
        color: inherit;
        display: block;
    }

    .post-list-featured-title {
        font-family: var(--font-serif);
        font-size: var(--fs-4);
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--heading);
        margin: 0 0 0.35em 0;
        line-height: 1.25;
    }

    .post-list-featured-title:hover {
        color: var(--accent);
    }

    .post-list-featured-excerpt {
        font-size: var(--fs-1);
        color: var(--muted);
        margin: 0;
        line-height: 1.5;
        max-width: 38em;
    }

    .post-list-item {
        padding: 0.35rem 0;
    }

    .post-list-item:last-child {
        border-bottom: none;
    }

    .post-list-item-link {
        color: var(--link);
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
        flex-wrap: wrap;
    }

    .post-list-item-link:hover {
        color: var(--accent);
    }

    .post-list-item-date {
        font-family: var(--font-mono);
        font-size: var(--fs--1);
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        flex: 0 0 auto;
    }

    .post-list-item-title {
        font-weight: 500;
    }

    /* ─── Home page head ─────────────────────────────────────── */
    .page-head {
        width: var(--page-head-width);
        margin: 0 0 1.75rem 0;
    }

    .page-head-title {
        margin: 0 0 0.55rem 0;
        font-family: var(--font-mono);
        font-size: var(--fs-2);
        font-weight: 600;
        color: var(--heading);
    }

    .page-head-ascii {
        margin: 0;
        font-family: var(--font-mono);
        font-size: var(--page-head-ascii-size);
        line-height: 1.16;
        color: var(--heading);
        white-space: pre;
        overflow-x: auto;
        overflow-y: hidden;
    }

    /* ─── Footer ─────────────────────────────────────────────── */
    footer {
        margin-top: 3rem;
        max-width: none;
        text-align: left;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
        font-size: var(--fs-0);
        color: var(--muted);
    }

    .footer-line {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.35rem;
        margin: 0;
    }

    .footer-copy {
        font-family: var(--font-mono);
        font-size: var(--fs--1);
    }

    .footer-links {
        display: flex;
        gap: 0.75rem;
        align-items: center;
    }

    .footer-links a {
        color: var(--muted);
        font-size: var(--fs--1);
        transition: color 0.18s ease;
    }

    .footer-links a:hover {
        color: var(--accent);
    }

    /* ─── Focus ring ─────────────────────────────────────────── */
    :focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
        border-radius: 2px;
    }

    /* ─── Dark mode toggle icon ──────────────────────────────── */
    .dark-mode-toggle,
    #dark-mode-toggle {
        background: none !important;
        border: none !important;
        cursor: pointer;
        margin-left: 0.75rem;
        padding: 0.25em;
        color: inherit;
        line-height: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition:
            transform 0.2s ease,
            opacity 0.2s ease;
    }

    .dark-mode-toggle:hover,
    #dark-mode-toggle:hover {
        opacity: 0.85;
        transform: scale(1.08);
    }

    .theme-icon {
        --size: 1.15em;
        width: var(--size);
        height: var(--size);
        position: relative;
        display: inline-block;
        flex-shrink: 0;
    }

    .theme-icon::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: currentColor;
        box-shadow: 0.22em 0 0 -0.12em var(--bg);
        transition:
            opacity 0.25s ease,
            transform 0.25s ease;
    }

    .theme-icon::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: currentColor;
        box-shadow:
            -1.4em 0 0 -0.75em currentColor,
            1.4em 0 0 -0.75em currentColor,
            0 -1.4em 0 -0.75em currentColor,
            0 1.4em 0 -0.75em currentColor,
            -1em -1em 0 -0.75em currentColor,
            1em -1em 0 -0.75em currentColor,
            -1em 1em 0 -0.75em currentColor,
            1em 1em 0 -0.75em currentColor;
        opacity: 0;
        transition:
            opacity 0.25s ease,
            transform 0.25s ease;
    }

    body.theme-dark .theme-icon::before {
        opacity: 0;
        transform: scale(0.8);
    }

    body.theme-dark .theme-icon::after {
        opacity: 1;
    }

    /* ─── Dark mode — system preference (dark blue–grey) ──────── */
    @media (prefers-color-scheme: dark) {
        body:not(.force-light):not(.force-dark) {
            --bg: #151922;
            --surface: #1c2030;
            --text: #c8cdd6;
            --heading: #e2e6ef;
            --link: #c8cdd6;
            --accent: #7ab4d0;
            --muted: #8a8f9e;
            --muted-strong: #9ca3b2;
            --border: #2a3142;
            --table-border: #363d50;
            --code-bg: #1a1e2c;
            --code-color: #c8cdd6;
            --pre-code-color: #c8cdd6;
            --blockquote-border: #7ab4d0;
            --mark-bg: #5a6a8a;
            --mark-text: #e2e6ef;
            --toc-frame: #8a8f9e;
            --toc-content-color: #8a8f9e;
            --toc-hover-bg: #3a4560;
            --toc-hover-text: #e2e6ef;
            --nav-border: #2a3142;
            --nav-label-color: #9ca3b2;
            --nav-title-color: #c8cdd6;
            --nav-title-hover: #e2e6ef;
            --helptext: #9ca3b2;
            --form-bg: #1c2030;
            --form-text: #c8cdd6;

            /* Blog heatmap scale (dark) */
            --heatmap-1: #3a7a9e;
            --heatmap-2: #5294b8;
            --heatmap-3: #6aaed0;
            --heatmap-4: #7ab4d0;
        }
    }

    /*
     * Dark palette when the site is in dark mode (.theme-dark from script, or .force-dark + .theme-dark).
     * Duplicates the @media (prefers-color-scheme: dark) block above so “force dark” works when OS is light.
     */
    body.theme-dark,
    body.force-dark {
        --bg: #151922;
        --surface: #1c2030;
        --text: #c8cdd6;
        --heading: #e2e6ef;
        --link: #c8cdd6;
        --link-hover-fg: #151922;
        --link-hover-bg: #e2e6ef;
        --accent: #7ab4d0;
        --muted: #8a8f9e;
        --muted-strong: #9ca3b2;
        --border: #2a3142;
        --table-border: #363d50;
        --code-bg: #1a1e2c;
        --code-color: #c8cdd6;
        --pre-code-color: #c8cdd6;
        --blockquote-border: #7ab4d0;
        --mark-bg: #5a6a8a;
        --mark-text: #e2e6ef;
        --toc-frame: #8a8f9e;
        --toc-content-color: #8a8f9e;
        --toc-hover-bg: #3a4560;
        --toc-hover-text: #e2e6ef;
        --nav-border: #2a3142;
        --nav-label-color: #9ca3b2;
        --nav-title-color: #c8cdd6;
        --nav-title-hover: #e2e6ef;
        --helptext: #9ca3b2;
        --form-bg: #1c2030;
        --form-text: #c8cdd6;
        --heatmap-1: #3a7a9e;
        --heatmap-2: #5294b8;
        --heatmap-3: #6aaed0;
        --heatmap-4: #7ab4d0;
    }

    body.force-dark {
        filter: none !important;
        -webkit-filter: none !important;
    }

    body.force-dark * {
        filter: none !important;
        -webkit-filter: none !important;
    }

    body.theme-dark .rss-link,
    body.force-dark .rss-link {
        border-bottom-color: #e8c547;
    }

    body.theme-dark .rss-link:hover,
    body.force-dark .rss-link:hover {
        border-bottom-color: #f5e076;
    }

    /* Enforce readable inverse-link state across component-specific overrides. */
    a[href]:hover,
    a[href]:focus-visible {
        color: var(--link-hover-fg) !important;
        background-color: var(--link-hover-bg) !important;
